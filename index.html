<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>労務マガジン一覧</title>

<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
    
<style>
:root{
    --bg-1:#f3f7fb;
    --bg-2:#e8eef7;
    --card:#ffffffcc;
    --text:#1f2937;
    --sub:#6b7280;
    --line:#e5e7eb;
    --primary:#2563eb;
    --primary-2:#1d4ed8;
    --accent:#dbeafe;
    --shadow:0 12px 30px rgba(31, 41, 55, 0.10);
    --shadow-soft:0 6px 18px rgba(31, 41, 55, 0.06);
    --radius:20px;
}

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
}

body{
    font-family: "Hiragino Sans","Hiragino Kaku Gothic ProN",Meiryo,"Yu Gothic UI",Arial,sans-serif;
    color:var(--text);
    background:
        radial-gradient(circle at top left, #ffffff 0%, transparent 35%),
        radial-gradient(circle at bottom right, #dbeafe 0%, transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    min-height:100vh;
    padding:32px 16px 56px;
}

.wrapper{
    max-width:980px;
    margin:0 auto;
}

.hero{
    position:relative;
    overflow:hidden;
    background:linear-gradient(135deg, #0f172a 0%, #1e3a8a 55%, #2563eb 100%);
    color:#fff;
    border-radius:28px;
    padding:44px 32px 38px;
    box-shadow:var(--shadow);
}

.hero::before,
.hero::after{
    content:"";
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    pointer-events:none;
}

.hero::before{
    width:260px;
    height:260px;
    top:-90px;
    right:-60px;
}

.hero::after{
    width:180px;
    height:180px;
    bottom:-70px;
    left:-40px;
}

.badge{
    display:inline-block;
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    padding:8px 12px;
    border-radius:999px;
    background:rgba(255,255,255,0.14);
    border:1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    margin-bottom:18px;
}

.hero h1{
    margin:0 0 14px;
    font-size:clamp(28px, 4vw, 42px);
    line-height:1.2;
    letter-spacing:.02em;
}

.hero p{
    margin:0;
    font-size:15px;
    line-height:1.8;
    color:rgba(255,255,255,0.88);
    max-width:700px;
}

.section{
    margin-top:28px;
    background:var(--card);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.6);
    border-radius:24px;
    padding:24px;
    box-shadow:var(--shadow-soft);
}

.section-head{
    display:flex;
    align-items:end;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:18px;
}

.section-title{
    margin:0;
    font-size:22px;
    line-height:1.3;
}

.section-sub{
    margin:6px 0 0;
    color:var(--sub);
    font-size:14px;
}

.count{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 14px;
    font-size:13px;
    color:var(--sub);
    white-space:nowrap;
}

.magazine-list{
    display:grid;
    gap:16px;
}

.card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:18px;
    padding:18px;
    border-radius:18px;
    background:#fff;
    border:1px solid var(--line);
    text-decoration:none;
    color:inherit;
    box-shadow:0 4px 10px rgba(15, 23, 42, 0.04);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}

.card:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 24px rgba(37, 99, 235, 0.12);
    border-color:#bfdbfe;
}

.card-left{
    display:flex;
    align-items:flex-start;
    gap:14px;
    min-width:0;
}

.icon{
    flex:0 0 52px;
    width:52px;
    height:52px;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg, #eff6ff, #dbeafe);
    color:var(--primary-2);
    font-size:22px;
    font-weight:700;
    box-shadow:inset 0 0 0 1px #bfdbfe;
}

.card-text{
    min-width:0;
}

.meta{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:6px;
}

.tag{
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    background:#eff6ff;
    color:var(--primary-2);
    font-size:12px;
    font-weight:700;
}

.date{
    font-size:12px;
    color:var(--sub);
}

.card-title{
    margin:0 0 6px;
    font-size:18px;
    line-height:1.5;
    color:var(--text);
    word-break:break-word;
}

.card-desc{
    margin:0;
    color:var(--sub);
    font-size:14px;
    line-height:1.7;
}

.arrow{
    flex:0 0 auto;
    width:42px;
    height:42px;
    border-radius:999px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid var(--line);
    color:var(--primary);
    background:#fff;
    font-size:20px;
    transition:background .18s ease, color .18s ease, border-color .18s ease;
}

.card:hover .arrow{
    background:var(--primary);
    color:#fff;
    border-color:var(--primary);
}

.footer{
    margin-top:18px;
    text-align:center;
    color:var(--sub);
    font-size:12px;
    line-height:1.8;
}

@media (max-width: 720px){
    body{
        padding:20px 12px 40px;
    }

    .hero{
        padding:32px 20px 28px;
        border-radius:22px;
    }

    .section{
        padding:18px;
        border-radius:20px;
    }

    .card{
        align-items:flex-start;
        padding:16px;
    }

    .arrow{
        margin-top:4px;
    }

    .card-title{
        font-size:16px;
    }
}
</style>
</head>
<body>
<div class="wrapper">

    <header class="hero">
        <div class="badge">LABOR MAGAZINE ARCHIVE</div>
        <h1>労務マガジン一覧</h1>
        <p>
            過去の配布資料を一覧で掲載しています。<br>
            テーマごとの実務ポイントを、必要なときにすぐ確認できるようまとめています。
        </p>
    </header>

    <main class="section">
        <div class="section-head">
            <div>
                <h2 class="section-title">公開中のマガジン</h2>
                <p class="section-sub">クリックすると各HTMLページを開きます。</p>
            </div>
            <div class="count">全 27 件</div>
        </div>

        <div class="magazine-list">






<a class="card" href="販売管理システム比較資料.html">
    <div class="card-left">
        <div class="icon">27</div>
        <div class="card-text">
            <div class="meta">
                <span class="tag">2026年6月UP</span>
                <span class="date">配布資料</span>
            </div>
            <h3 class="card-title">販売管理システム比較資料</h3>
            <p class="card-desc">

        </div>
    </div>
    <div class="arrow">›</div>

        </div>
    </main>

    <footer class="footer">
        土橋<br>
        労務マガジンアーカイブ
    </footer>

</div>
</body>
</html>
